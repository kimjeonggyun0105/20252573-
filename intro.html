<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학교소개 - 학교 홈페이지</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        .sub-hero {
            height: 40vh;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
        }
        .content-section {
            padding: 80px 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .intro-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-top: 40px;
        }
        @media (max-width: 768px) {
            .intro-grid { grid-template-columns: 1fr; }
            .sub-hero h1 { font-size: 2rem; }
        }
        .intro-text h2 {
            color: var(--primary-color);
            margin-bottom: 20px;
        }
        .intro-img {
            background: #eee;
            height: 300px;
            border-radius: 10px;
            overflow: hidden;
        }
        .intro-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body class="sub-page">
    <header id="header" class="scrolled">
        <div class="container">
            <div class="logo">
                <a href="index.html">DONGYANG MIRAE</a>
            </div>
            <nav>
                <ul>
                    <li><a href="intro.html" class="active">학교소개</a></li>
                    <li><a href="dept.html">학과소개</a></li>
                    <li><a href="portfolio.html">나의 포트폴리오</a></li>
                    <li><a href="company.html">관련 회사</a></li>
                    <li><a href="life.html">학교 생활</a></li>
                </ul>
            </nav>
            <div class="header-icons">
                <button class="icon-btn search-btn">🔍</button>
                <button class="icon-btn menu-btn">☰</button>
            </div>
        </div>
    </header>

    <main>
        <section class="sub-hero">
            <h1 class="animate-fade-up">학교소개</h1>
        </section>

        <section class="content-section">
            <div class="intro-grid">
                <div class="intro-text animate-fade-up delay-1">
                    <h2>교육이 미래를 바꿉니다</h2>
                    <p>우리 학교는 19XX년 설립 이래, 글로벌 리더를 양성하기 위해 최선의 노력을 다하고 있습니다. 창의적 사고와 바른 인성을 갖춘 인재들이 세상을 향해 나아갈 수 있도록 돕습니다.</p>
                    <p style="margin-top:20px;">건학이념: 창의, 성실, 봉사</p>
                </div>
                <div class="intro-img animate-fade-up delay-2">
                    <img src="assets/hero_bg.png" alt="School Image">
                </div>
            </div>
        </section>
    </main>

    <footer style="padding: 40px; background: #333; color: white; text-align: center;">
        <p>&copy; 2026 SCHOOL LOGO. All rights reserved.</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
