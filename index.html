<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GourmetSpot - 지역별 맛집 검색</title>
    <!-- 폰트 및 아이콘 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 커스텀 스타일 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header id="navbar">
        <div class="container header-inner">
            <a href="#" class="logo">
                <i class="fas fa-utensils"></i> GourmetSpot
            </a>
            <nav>
                <a href="#" class="active">홈</a>
                <a href="#">탐색</a>
                <a href="#">베스트 맛집</a>
            </nav>
            <button class="menu-btn"><i class="fas fa-bars"></i></button>
        </div>
    </header>

    <!-- Hero Section with Search -->
    <section class="hero">
        <div class="hero-bg"></div>
        <div class="hero-overlay"></div>
        <div class="container hero-content">
            <h1 class="fade-in-up">숨겨진 나만의 맛집을 찾아보세요</h1>
            <p class="fade-in-up delay-1">발길이 머무는 어느 곳이든, 검증된 미식의 경험과 품격 있는 식탁을 제안합니다.</p>
            
            <div class="search-box fade-in-up delay-2">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="search-input" placeholder="검색어를 자유롭게 입력해 보세요 (예: 애월읍, 스타벅스, 고척돔 냉면)" autocomplete="off">
                <button id="search-btn">검색</button>
            </div>
            <div class="popular-tags fade-in-up delay-3">
                <span>추천 검색어:</span>
                <span class="tag" data-search="고척돔 냉면">고척돔 냉면</span>
                <span class="tag" data-search="스타벅스">스타벅스</span>
                <span class="tag" data-search="청라">인천 청라</span>
                <span class="tag" data-search="해운대 수제버거">해운대 수제버거</span>
            </div>
        </div>
    </section>

    <!-- Results Section -->
    <section class="results-section container">
        <!-- Category Filters -->
        <div class="category-filters fade-in-up">
            <button class="filter-btn active" data-type="all">전체보기</button>
            <button class="filter-btn" data-type="한식">한식</button>
            <button class="filter-btn" data-type="분식">분식</button>
            <button class="filter-btn" data-type="중식">중식</button>
            <button class="filter-btn" data-type="일식">일식</button>
            <button class="filter-btn" data-type="양식">양식</button>
            <button class="filter-btn" data-type="기타">기타 세계요리</button>
        </div>

        <div class="results-header">
            <h2 id="results-title">추천 맛집</h2>
            <p id="results-count">전체 <span class="highlight">6</span>개의 결과가 있습니다.</p>
        </div>

        <!-- Grid Container for Restaurant Cards -->
        <div id="results-grid" class="grid">
            <!-- JavaScript will inject cards here -->
        </div>

        <!-- Empty State (Hidden initially) -->
        <div id="empty-state" class="empty-state hidden">
            <i class="far fa-sad-tear"></i>
            <h3>검색 결과가 없습니다.</h3>
            <p>다른 지역이나 지역명을 정확히 입력해 보세요.</p>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>&copy; 2026 GourmetSpot. All Rights Reserved.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="main.js"></script>
</body>
</html>
